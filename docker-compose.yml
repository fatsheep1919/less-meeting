services:
  less-meeting:
    build: .
    container_name: less-meeting
    network_mode: host
    restart: unless-stopped
    environment:
      - ANNOUNCED_IP=${ANNOUNCED_IP}
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: less-meeting-nginx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - less-meeting
